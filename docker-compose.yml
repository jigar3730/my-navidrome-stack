services:
  navidrome:
    image: deluan/navidrome:latest
    user: "${PUID}:${PGID}"
    ports:
      - "4533:4533"
    restart: unless-stopped
    environment:
      ND_SCANSCHEDULE: 1h
      ND_LOGLEVEL: info
      ND_BASEURL: "${NAVIDROME_BASE_URL}"
      ND_DATAFOLDER: /data
      ND_MUSICFOLDER: /music
      # Optional: Use folder names as Album titles if tags are missing
      ND_ALBUMIDENTIFIER: folder 
    volumes:
      - "${STACK_DIR}/data:/data"
      - "${MUSIC_FOLDER}:/music"

  beets:
    image: lscr.io/linuxserver/beets:latest
    container_name: beets
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Etc/UTC
    volumes:
      - "${STACK_DIR}/beets:/config"
      - "${MUSIC_FOLDER}:/music"
      - "./beets/config.yaml:/config/config.yaml:ro"