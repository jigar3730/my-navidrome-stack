services:
  navidrome:
    image: deluan/navidrome:latest
    user: "${PUID}:${PGID}" # Matches your Ubuntu user to prevent permission issues
    ports:
      - "4533:4533"
    restart: unless-stopped
    environment:
      ND_SCANSCHEDULE: 1h
      ND_LOGLEVEL: info
      ND_BASEURL: "${NAVIDROME_BASE_URL}" # e.g., https://music.yourdomain.com
    volumes:
      - ./data:/data
      - "${MUSIC_FOLDER}:/music:ro" # Read-only access to your music
